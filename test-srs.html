<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SRS 引擎测试</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; max-width: 720px; margin: 2rem auto; padding: 0 1rem; background: #f7f5ef; }
    h1 { font-size: 20px; font-weight: 500; margin-bottom: 1rem; }
    h2 { font-size: 16px; font-weight: 500; margin: 1.5rem 0 0.5rem; color: #534AB7; }
    .pass { color: #3B6D11; }
    .fail { color: #A32D2D; }
    pre { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 1rem; overflow-x: auto; font-size: 13px; line-height: 1.5; }
    .test-result { margin: 0.5rem 0; padding: 0.5rem 0.75rem; border-radius: 6px; }
    .test-result.pass { background: #EAF3DE; }
    .test-result.fail { background: #FCEBEB; }
    .summary { background: #EEEDFE; border-radius: 8px; padding: 1rem; margin: 1rem 0; }
  </style>
</head>
<body>
  <h1>SRS 引擎单元测试</h1>
  <div id="output"></div>

  <script src="srs.js"></script>
  <script>
    (function () {
      var out = document.getElementById('output');
      var passCount = 0;
      var failCount = 0;
      var SRS = window.SRSEngine;

      function log(html) {
        out.innerHTML += html;
      }

      function assert(condition, name, detail) {
        if (condition) {
          passCount++;
          log('<div class="test-result pass"><span class="pass">PASS</span> — ' + name + (detail ? ' <small>' + detail + '</small>' : '') + '</div>');
        } else {
          failCount++;
          log('<div class="test-result fail"><span class="fail">FAIL</span> — ' + name + (detail ? ' <small>' + detail + '</small>' : '') + '</div>');
        }
      }

      function approxEqual(a, b, tolerance) {
        tolerance = tolerance || 0.01;
        return Math.abs(a - b) <= tolerance;
      }

      /* ========== 测试 1：新卡工厂 ========== */
      log('<h2>1. 新卡工厂</h2>');
      var card = SRS.createNewCard('english:college-iv:hello');
      assert(card.cardId === 'english:college-iv:hello', 'cardId 正确');
      assert(card.state === 'new', '初始状态为 new');
      assert(card.ease === 2.5, '初始易度 2.5', 'ease=' + card.ease);
      assert(card.interval === 0, '初始间隔 0');
      assert(card.reps === 0, '初始复习次数 0');
      assert(card.lapses === 0, '初始遗忘次数 0');
      assert(card.due === 0, 'new 卡 due=0（始终到期）');

      /* ========== 测试 2：新卡首次评分 ========== */
      log('<h2>2. 新卡首次评分</h2>');
      var conf = SRS.DEFAULT_CONFIG;

      // Again → learning step 0 (1 min)
      var againCard = SRS.schedule(SRS.createNewCard('t1'), 'again', conf);
      assert(againCard.state === 'learning', 'Again → learning');
      assert(againCard.stepIdx === 0, 'Again → stepIdx=0');
      assert(againCard.reps === 1, 'Again → reps=1');
      log('<pre>Again 结果: state=' + againCard.state + ', stepIdx=' + againCard.stepIdx + ', interval=' + againCard.interval + '</pre>');

      // Good → learning step 1 (10 min) if 2 steps
      var goodCard = SRS.schedule(SRS.createNewCard('t2'), 'good', conf);
      assert(goodCard.state === 'learning', 'Good → learning (有2步)');
      assert(goodCard.stepIdx === 1, 'Good → stepIdx=1');
      log('<pre>Good 结果: state=' + goodCard.state + ', stepIdx=' + goodCard.stepIdx + '</pre>');

      // Easy → 直接毕业，间隔 4 天
      var easyCard = SRS.schedule(SRS.createNewCard('t3'), 'easy', conf);
      assert(easyCard.state === 'review', 'Easy → review (直接毕业)');
      assert(easyCard.interval === 4, 'Easy 间隔 4 天', 'interval=' + easyCard.interval);
      assert(approxEqual(easyCard.ease, 2.65), 'Easy ease=2.5+0.15=2.65', 'ease=' + easyCard.ease);
      log('<pre>Easy 结果: state=' + easyCard.state + ', interval=' + easyCard.interval + ', ease=' + easyCard.ease.toFixed(2) + '</pre>');

      /* ========== 测试 3：学习步阶推进 ========== */
      log('<h2>3. 学习步阶推进</h2>');
      var learningCard = { cardId: 't4', state: 'learning', stepIdx: 0, ease: 2.5, interval: 0, reps: 1, lapses: 0, due: Date.now(), lastReview: 0, flags: 0, suspended: false, buried: false, buriedUntil: 0, tags: [] };

      // step 0 → Good → step 1 (10 min)
      var step1 = SRS.schedule(learningCard, 'good', conf);
      assert(step1.state === 'learning', '学习步阶 Good → 仍在 learning');
      assert(step1.stepIdx === 1, '推进到 stepIdx=1');

      // step 1 → Good → 毕业 (1 天)
      var graduated = SRS.schedule(step1, 'good', conf);
      assert(graduated.state === 'review', '最后步阶 Good → 毕业为 review');
      assert(graduated.interval === 1, 'Good 毕业间隔 1 天', 'interval=' + graduated.interval);
      log('<pre>毕业结果: state=' + graduated.state + ', interval=' + graduated.interval + ', ease=' + graduated.ease.toFixed(2) + '</pre>');

      // 学习中 Again → 回到 step 0
      var resetCard = SRS.schedule(step1, 'again', conf);
      assert(resetCard.state === 'learning', '学习中 Again → 回到 learning');
      assert(resetCard.stepIdx === 0, 'Again → stepIdx 重置为 0');

      /* ========== 测试 4：复习卡间隔增长 ========== */
      log('<h2>4. 复习卡间隔增长</h2>');
      var reviewCard1 = { cardId: 't5', state: 'review', stepIdx: 0, ease: 2.5, interval: 1, reps: 3, lapses: 0, due: Date.now(), lastReview: Date.now(), flags: 0, suspended: false, buried: false, buriedUntil: 0, tags: [] };

      // interval=1, ease=2.5, Good → interval = 1 * 2.5 = 2.5 ≈ 3 天
      var r2 = SRS.schedule(reviewCard1, 'good', conf);
      assert(r2.state === 'review', 'Good 仍为 review');
      assert(r2.interval === 3, '1×2.5=2.5→round=3 天', 'interval=' + r2.interval);
      log('<pre>1天→Good: interval=' + r2.interval + ', ease=' + r2.ease.toFixed(2) + '</pre>');

      // interval=3, ease=2.5, Good → 3 * 2.5 = 7.5 ≈ 8 天
      var r3 = SRS.schedule(r2, 'good', conf);
      assert(r3.interval === 8, '3×2.5=7.5→round=8 天', 'interval=' + r3.interval);

      // interval=8, ease=2.5, Good → 8 * 2.5 = 20 天
      var r4 = SRS.schedule(r3, 'good', conf);
      assert(r4.interval === 20, '8×2.5=20 天', 'interval=' + r4.interval);

      // interval=20, ease=2.5, Easy → 20 * 2.5 * 1.3 = 65 天, ease=2.65
      var r5 = SRS.schedule(r4, 'easy', conf);
      assert(r5.interval === 65, '20×2.5×1.3=65 天', 'interval=' + r5.interval);
      assert(approxEqual(r5.ease, 2.65), 'Easy ease+0.15=2.65');

      // interval=20, Hard → 20 * 1.2 = 24 天, ease-0.15=2.35
      var rHard = SRS.schedule(r4, 'hard', conf);
      assert(rHard.interval === 24, '20×1.2=24 天', 'interval=' + rHard.interval);
      assert(approxEqual(rHard.ease, 2.35), 'Hard ease-0.15=2.35');

      log('<pre>间隔增长序列: 1→3→8→20→65(Easy) / 1→3→8→20→24(Hard)</pre>');

      /* ========== 测试 5：遗忘（Again）与重学 ========== */
      log('<h2>5. 遗忘与重学</h2>');
      var matureCard = { cardId: 't6', state: 'review', stepIdx: 0, ease: 2.5, interval: 20, reps: 5, lapses: 0, due: Date.now(), lastReview: Date.now(), flags: 0, suspended: false, buried: false, buriedUntil: 0, tags: [] };

      // Again → relearning
      var lapsed = SRS.schedule(matureCard, 'again', conf);
      assert(lapsed.state === 'relearning', 'Again → relearning');
      assert(lapsed.lapses === 1, 'lapses+1=1');
      assert(approxEqual(lapsed.ease, 2.3), 'ease-0.2=2.3', 'ease=' + lapsed.ease.toFixed(2));
      log('<pre>遗忘: state=' + lapsed.state + ', lapses=' + lapsed.lapses + ', ease=' + lapsed.ease.toFixed(2) + '</pre>');

      // 重学 Good → 毕业，间隔 1 天
      var reGraduated = SRS.schedule(lapsed, 'good', conf);
      assert(reGraduated.state === 'review', '重学 Good → 回到 review');
      assert(reGraduated.interval === 1, '重学毕业间隔 1 天', 'interval=' + reGraduated.interval);
      log('<pre>重学毕业: state=' + reGraduated.state + ', interval=' + reGraduated.interval + '</pre>');

      // 连续遗忘 ease 下限
      var easeDrop = SRS.createNewCard('t7');
      easeDrop.state = 'review'; easeDrop.ease = 1.3; easeDrop.interval = 5;
      easeDrop.reps = 10; easeDrop.lapses = 5; easeDrop.due = Date.now(); easeDrop.lastReview = Date.now();
      var minEaseCard = SRS.schedule(easeDrop, 'again', conf);
      assert(minEaseCard.ease >= 1.3, 'ease 不低于 1.3', 'ease=' + minEaseCard.ease.toFixed(2));

      /* ========== 测试 6：间隔预览 ========== */
      log('<h2>6. 间隔预览</h2>');
      var previewCard = { cardId: 't8', state: 'review', stepIdx: 0, ease: 2.5, interval: 10, reps: 4, lapses: 0, due: Date.now(), lastReview: Date.now(), flags: 0, suspended: false, buried: false, buriedUntil: 0, tags: [] };
      var preview = SRS.previewIntervals(previewCard, conf);
      log('<pre>review (interval=10, ease=2.5) 的按钮预览:\n' +
        '  Again: ' + preview.again.label + ' (→' + preview.again.state + ')\n' +
        '  Hard:  ' + preview.hard.label + ' (→' + preview.hard.state + ', interval=' + preview.hard.interval + ')\n' +
        '  Good:  ' + preview.good.label + ' (→' + preview.good.state + ', interval=' + preview.good.interval + ')\n' +
        '  Easy:  ' + preview.easy.label + ' (→' + preview.easy.state + ', interval=' + preview.easy.interval + ')\n</pre>');
      assert(preview.again.state === 'relearning', 'Again → relearning');
      assert(preview.hard.interval === 12, 'Hard 10×1.2=12', 'interval=' + preview.hard.interval);
      assert(preview.good.interval === 25, 'Good 10×2.5=25', 'interval=' + preview.good.interval);
      assert(preview.easy.interval === 33, 'Easy 10×2.5×1.3=32.5→33', 'interval=' + preview.easy.interval);

      /* ========== 测试 7：格式化 ========== */
      log('<h2>7. 间隔格式化</h2>');
      assert(SRS.formatInterval(5 * 60000, 'learning') === '5 分钟', '5分钟');
      assert(SRS.formatInterval(90 * 60000, 'learning') === '2 小时', '90分钟→2小时');
      assert(SRS.formatInterval(DAY_MS, 'review') === '1 天', '1天');
      assert(SRS.formatInterval(30 * DAY_MS, 'review') === '30 天', '30天');
      assert(SRS.formatInterval(60 * DAY_MS, 'review') === '2 月', '60天→2月');
      assert(SRS.formatInterval(400 * DAY_MS, 'review') === '1 年', '400天→1年');

      /* ========== 测试 8：cardId → deckId ========== */
      log('<h2>8. cardId 解析</h2>');
      assert(SRS.cardIdToDeckId('english:college-iv:hello') === 'english:college-iv', '英语词书 deckId');
      assert(SRS.cardIdToDeckId('lunyu:default:xueer::1') === 'lunyu:default', '论语 deckId');
      assert(SRS.cardIdToDeckId('custom:abc123::deck1:0') === 'custom:abc123', '自建牌组 deckId');

      /* ========== 测试 9：存储层 ========== */
      log('<h2>9. 存储层读写</h2>');
      var testAccountId = '__srs_test__';
      // 清除旧测试数据
      localStorage.removeItem('songji-srs-v1:' + testAccountId);

      var empty = SRS.loadSRSData(testAccountId);
      assert(Object.keys(empty.cardStates).length === 0, '初始无卡片状态');
      assert(empty.config.global.newCardsPerDay === 20, '默认每日新卡 20');

      // 写入一张卡
      var testCard = SRS.createNewCard('test:deck:word1');
      testCard.state = 'review'; testCard.interval = 5; testCard.ease = 2.5;
      empty.cardStates['test:deck:word1'] = testCard;
      SRS.saveSRSData(testAccountId, empty);

      var loaded = SRS.loadSRSData(testAccountId);
      assert(loaded.cardStates['test:deck:word1'].state === 'review', '存储读写一致');
      assert(loaded.cardStates['test:deck:word1'].interval === 5, '间隔读写一致');

      // reviewCard 完整流程
      var reviewed = SRS.reviewCard(testAccountId, 'test:deck:word1', 'good');
      assert(reviewed.interval === 13, '5×2.5=12.5→13', 'interval=' + reviewed.interval);

      // 清理
      localStorage.removeItem('songji-srs-v1:' + testAccountId);

      /* ========== 测试 10：队列辅助 ========== */
      log('<h2>10. 队列辅助</h2>');
      localStorage.removeItem('songji-srs-v1:' + testAccountId);
      var queueData = SRS.createEmptySRSData();

      // 添加几张不同状态的卡
      var now = Date.now();
      var cards = [
        SRS.createNewCard('q:deck:a'),
        SRS.createNewCard('q:deck:b'),
        SRS.createNewCard('q:deck:c'),
        SRS.createNewCard('q:deck:d'),
        SRS.createNewCard('q:deck:e')
      ];
      cards[0].state = 'review'; cards[0].interval = 5; cards[0].due = now - DAY_MS; // 过期
      cards[1].state = 'review'; cards[1].interval = 10; cards[1].due = now + DAY_MS; // 未到期
      cards[2].state = 'learning'; cards[2].stepIdx = 0; cards[2].due = now - 60000; // 过期学习
      cards[3].state = 'new'; // 新卡
      cards[4].suspended = true; // 暂停卡

      for (var i = 0; i < cards.length; i++) {
        queueData.cardStates[cards[i].cardId] = cards[i];
      }
      SRS.saveSRSData(testAccountId, queueData);

      var due = SRS.getDueCards(testAccountId, 'q:deck');
      assert(due.length === 2, '2张到期卡（learning+过期review）', 'due.length=' + due.length);
      assert(due[0].state === 'learning', 'learning 优先排前', 'first=' + due[0].state);

      var newSlots = SRS.getNewCardSlots(testAccountId, 'q:deck');
      assert(newSlots === 20, '今日新卡限额 20', 'slots=' + newSlots);

      var newAvailable = SRS.getAvailableNewCards(testAccountId, 'q:deck', ['q:deck:c', 'q:deck:f', 'q:deck:g']);
      assert(newAvailable.length === 2, '2张可用新卡（c 已是 new, f/g 未有状态）', 'len=' + newAvailable.length);

      // 清理
      localStorage.removeItem('songji-srs-v1:' + testAccountId);

      /* ========== 测试 11：卡片操作 ========== */
      log('<h2>11. 卡片操作</h2>');
      localStorage.removeItem('songji-srs-v1:' + testAccountId);
      var opData = SRS.createEmptySRSData();
      var opCard = SRS.createNewCard('op:deck:x');
      opCard.state = 'review'; opCard.interval = 5;
      opData.cardStates['op:deck:x'] = opCard;
      SRS.saveSRSData(testAccountId, opData);

      SRS.buryCard(testAccountId, 'op:deck:x');
      var buried = SRS.loadSRSData(testAccountId).cardStates['op:deck:x'];
      assert(buried.buried === true, '搁置成功');

      SRS.suspendCard(testAccountId, 'op:deck:y');
      var suspended = SRS.loadSRSData(testAccountId).cardStates['op:deck:y'];
      assert(suspended.suspended === true, '暂停成功');

      SRS.setCardFlag(testAccountId, 'op:deck:x', 3);
      var flagged = SRS.loadSRSData(testAccountId).cardStates['op:deck:x'];
      assert(flagged.flags === 3, '标记为绿色(3)');

      SRS.resetCard(testAccountId, 'op:deck:x');
      var reset = SRS.loadSRSData(testAccountId).cardStates['op:deck:x'];
      assert(reset.state === 'new', '重置为 new');

      SRS.unsuspendCard(testAccountId, 'op:deck:y');
      var unsuspended = SRS.loadSRSData(testAccountId).cardStates['op:deck:y'];
      assert(unsuspended.suspended === false, '恢复暂停');

      localStorage.removeItem('songji-srs-v1:' + testAccountId);

      /* ========== 汇总 ========== */
      log('<div class="summary"><strong>测试结果：</strong><span class="pass">' + passCount + ' 通过</span>，<span class="fail">' + failCount + ' 失败</span>（共 ' + (passCount + failCount) + ' 项）</div>');

      if (failCount > 0) {
        log('<p style="color:#A32D2D;font-weight:500;">存在失败项，请检查上方标记为 FAIL 的测试。</p>');
      } else {
        log('<p style="color:#3B6D11;font-weight:500;">全部通过，SRS 引擎逻辑正确。</p>');
      }
    })();
  </script>
</body>
</html>
