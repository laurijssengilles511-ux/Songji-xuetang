<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>统计看板 · 诵记学堂</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar" id="topbar"></header>

    <main class="wrap" id="srsStatsPage">
      <div class="crumb"><a href="index.html">首页</a> / 统计</div>

      <div class="page-head compact-head">
        <div>
          <h1>统计看板</h1>
          <p class="sub">复习节奏、到期预测和卡片状态会在这里汇总。</p>
        </div>
        <a class="btn primary" href="dictation.html?startSrs=1">开始今日复习</a>
      </div>

      <section class="stats compact-stats" id="statsOverview"></section>

      <section class="dashboard-grid">
        <article class="panel chart-panel">
          <div class="section-title">
            <h2>未来 7 天</h2>
            <span class="hint-text">到期预测</span>
          </div>
          <div id="forecast7"></div>
        </article>

        <article class="panel chart-panel">
          <div class="section-title">
            <h2>未来 30 天</h2>
            <span class="hint-text">复习负荷</span>
          </div>
          <div id="forecast30"></div>
        </article>

        <article class="panel chart-panel">
          <div class="section-title">
            <h2>卡片分布</h2>
            <span class="hint-text">按 SRS 状态</span>
          </div>
          <div class="distribution-grid">
            <div id="statePie"></div>
            <div class="legend-list" id="stateLegend"></div>
          </div>
        </article>

        <article class="panel chart-panel">
          <div class="section-title">
            <h2>今日表现</h2>
            <span class="hint-text">难度与用时</span>
          </div>
          <div id="retentionPanel"></div>
        </article>
      </section>
    </main>

    <script src="data/college-english-iv.js"></script>
    <script src="data/russian-wordbook.js"></script>
    <script src="data/lunyu-translations.js"></script>
    <script src="vendor/supabase.min.js"></script>
    <script src="supabase-config.js"></script>
    <script src="supabase-client.js"></script>
    <script src="srs.js"></script>
    <script src="app.js"></script>
  </body>
</html>
